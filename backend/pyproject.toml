[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501 (line-too-long) is intentionally disabled — `ruff format` handles
# code layout, and prompt strings / data literals are allowed to exceed the
# nominal line length without triggering lint errors.
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
# Retrofit-friendly codes — disabled for the first green run because they fire
# heavily on third-party type weakness (Supabase Client, slowapi, structlog) and
# on intentional stub-provider simplifications. Tighten as a follow-up after
# code is incrementally typed.
disable_error_code = ["attr-defined", "arg-type", "assignment", "override", "union-attr", "index", "call-overload"]

[tool.pytest.ini_options]
testpaths = ["tests"]
